<!doctype html>
<html lang="en" class="h-full bg-slate-950">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planetiler GUI</title>
  <style>
    body {
      margin: 0;
      background: #020617;
      color: #e2e8f0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    .fallback-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
    }

    #dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1rem;
    }

    #map-panel,
    #controls-panel,
    #logs-panel {
      border: 1px solid #334155;
      border-radius: 0.75rem;
      background: #0f172a;
    }

    #controls-panel,
    #logs-panel {
      padding: 1rem;
    }

    #bbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    #bbox-grid label,
    #extra-args-label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    input,
    textarea,
    button {
      border-radius: 0.4rem;
      border: 1px solid #475569;
      background: #1e293b;
      color: #e2e8f0;
      padding: 0.45rem 0.6rem;
      font: inherit;
    }

    button {
      background: #06b6d4;
      border-color: #06b6d4;
      color: #0f172a;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #downloadInputBtn {
      background: #10b981;
      border-color: #10b981;
    }

    #status-box,
    #input-box {
      border: 1px solid #334155;
      border-radius: 0.6rem;
      background: #020617;
      padding: 0.75rem;
    }

    #logs {
      border-radius: 0.5rem;
      border: 1px solid #334155;
      background: #020617;
      padding: 0.75rem;
    }

    #map {
      min-height: 500px;
      background: #0f172a;
    }

    @media (max-width: 1024px) {
      #dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body class="h-full text-slate-100">
  <main class="fallback-shell mx-auto flex h-full max-w-7xl flex-col gap-4 p-4 lg:p-6">
    <header>
      <h1 class="text-2xl font-bold">Planetiler GUI Dashboard</h1>
      <p class="text-sm text-slate-300">Generate PMTiles from local OSM extracts in Docker.</p>
    </header>

    <section id="dashboard-grid" class="grid flex-1 grid-cols-1 gap-4 lg:grid-cols-3">
      <div id="map-panel" class="col-span-2 overflow-hidden rounded-xl border border-slate-700 bg-slate-900">
        <div id="map" class="h-[500px] w-full"></div>
      </div>

      <div id="controls-panel" class="flex flex-col gap-4 rounded-xl border border-slate-700 bg-slate-900 p-4">
        <h2 class="text-lg font-semibold">Bounding Box</h2>
        <div id="input-box" class="rounded-lg border border-slate-700 bg-slate-950 p-3 text-sm">
          <div class="mb-2 font-medium text-slate-200">Main OSM Input</div>
          <div id="inputStatus" class="text-slate-300">Checking input file...</div>
          <button id="downloadInputBtn"
            class="mt-3 rounded-lg bg-emerald-500 px-3 py-2 text-sm font-semibold text-slate-900 transition hover:bg-emerald-400 disabled:cursor-not-allowed disabled:opacity-50">
            Download Baden-Württemberg Extract
          </button>
        </div>
        <div id="bbox-grid" class="grid grid-cols-2 gap-3">
          <label class="flex flex-col gap-1 text-sm">minX<input id="minX" type="number" step="any"
              class="rounded border border-slate-600 bg-slate-800 p-2" /></label>
          <label class="flex flex-col gap-1 text-sm">minY<input id="minY" type="number" step="any"
              class="rounded border border-slate-600 bg-slate-800 p-2" /></label>
          <label class="flex flex-col gap-1 text-sm">maxX<input id="maxX" type="number" step="any"
              class="rounded border border-slate-600 bg-slate-800 p-2" /></label>
          <label class="flex flex-col gap-1 text-sm">maxY<input id="maxY" type="number" step="any"
              class="rounded border border-slate-600 bg-slate-800 p-2" /></label>
          <label class="flex flex-col gap-1 text-sm">minZoom<input id="minZoom" type="number" min="0" max="16" step="1"
              class="rounded border border-slate-600 bg-slate-800 p-2" placeholder="optional (0-16)" /></label>
          <label class="flex flex-col gap-1 text-sm">maxZoom<input id="maxZoom" type="number" min="0" max="16" step="1"
              class="rounded border border-slate-600 bg-slate-800 p-2" placeholder="optional (0-16)" /></label>
        </div>
        <button id="presetRenquishausenBtn"
          class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-semibold text-slate-100 transition hover:bg-slate-600">
          Default Renquishausen (8.873014, 48.073240 to 8.918314, 48.093240)
        </button>
        <label id="extra-args-label" class="flex flex-col gap-1 text-sm">
          Additional Planetiler Args (one per line, e.g. --simplify-tolerance-at-max-zoom=0.7)
          <textarea id="extraArgs" rows="4" class="rounded border border-slate-600 bg-slate-800 p-2 font-mono text-xs"
            placeholder="--threads=8\n--force"></textarea>
        </label>

        <button id="startBtn"
          class="mt-2 rounded-lg bg-cyan-500 px-4 py-3 text-base font-semibold text-slate-900 transition hover:bg-cyan-400 disabled:cursor-not-allowed disabled:opacity-50">
          Start Generation
        </button>

        <div id="status-box" class="rounded-lg border border-slate-700 bg-slate-950 p-3 text-sm">
          <div id="status" class="font-medium text-cyan-300">Ready</div>
          <a id="downloadLink" href="#" class="mt-2 hidden text-cyan-400 underline" download>Download latest
            .pmtiles</a>
        </div>
      </div>
    </section>

    <section id="logs-panel" class="rounded-xl border border-slate-700 bg-slate-900 p-4">
      <h2 class="mb-2 text-lg font-semibold">Live Logs</h2>
      <pre id="logs"
        class="h-64 overflow-auto whitespace-pre-wrap rounded bg-slate-950 p-3 text-xs text-slate-200"></pre>
    </section>
  </main>

  <script>
    const inputs = {
      minX: document.getElementById('minX'),
      minY: document.getElementById('minY'),
      maxX: document.getElementById('maxX'),
      maxY: document.getElementById('maxY')
    };
    const logs = document.getElementById('logs');
    const statusEl = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');
    const startBtn = document.getElementById('startBtn');
    const inputStatus = document.getElementById('inputStatus');
    const downloadInputBtn = document.getElementById('downloadInputBtn');
    const presetRenquishausenBtn = document.getElementById('presetRenquishausenBtn');
    const minZoomInput = document.getElementById('minZoom');
    const maxZoomInput = document.getElementById('maxZoom');
    const extraArgsInput = document.getElementById('extraArgs');
    const PLANETILER_MAX_ZOOM = 16;
    const MAX_LOG_LINES = 2000;

    const logLines = [];
    const pendingLogLines = [];
    let logFlushScheduled = false;

    let rectangle = null;
    let cornerMarkers = null;
    let centerMarker = null;
    let map = null;
    if (window.L) {
      map = L.map('map');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const initialBounds = L.latLngBounds([47.2, 8.4], [47.6, 8.9]);
      rectangle = L.rectangle(initialBounds, {
        color: '#22d3ee',
        weight: 2
      }).addTo(map);
      cornerMarkers = {
        sw: L.marker(initialBounds.getSouthWest(), { draggable: true }).addTo(map),
        nw: L.marker(initialBounds.getNorthWest(), { draggable: true }).addTo(map),
        ne: L.marker(initialBounds.getNorthEast(), { draggable: true }).addTo(map),
        se: L.marker(initialBounds.getSouthEast(), { draggable: true }).addTo(map)
      };
      centerMarker = L.marker(initialBounds.getCenter(), { draggable: true }).addTo(map);

      map.fitBounds(initialBounds.pad(0.5));
    } else {
      document.getElementById('map').textContent = 'Leaflet could not be loaded. BBOX can still be set via the fields.';
    }

    function flushLogs() {
      logFlushScheduled = false;
      if (pendingLogLines.length === 0) return;

      const isNearBottom = logs.scrollHeight - logs.scrollTop - logs.clientHeight < 24;
      logLines.push(...pendingLogLines);
      pendingLogLines.length = 0;

      if (logLines.length > MAX_LOG_LINES) {
        logLines.splice(0, logLines.length - MAX_LOG_LINES);
      }

      logs.textContent = `${logLines.join('\n')}\n`;
      if (isNearBottom) {
        logs.scrollTop = logs.scrollHeight;
      }
    }

    function scheduleLogFlush() {
      if (logFlushScheduled) return;
      logFlushScheduled = true;
      requestAnimationFrame(flushLogs);
    }

    function appendLog(line) {
      pendingLogLines.push(line);
      scheduleLogFlush();
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setInputStatus(text) {
      inputStatus.textContent = text;
    }

    function updateInputsFromRectangle() {
      if (!rectangle) return;
      const b = rectangle.getBounds();
      inputs.minX.value = b.getWest().toFixed(6);
      inputs.minY.value = b.getSouth().toFixed(6);
      inputs.maxX.value = b.getEast().toFixed(6);
      inputs.maxY.value = b.getNorth().toFixed(6);
    }

    function syncHandlesFromRectangle() {
      if (!rectangle || !cornerMarkers || !centerMarker) return;
      const b = rectangle.getBounds();
      cornerMarkers.sw.setLatLng(b.getSouthWest());
      cornerMarkers.nw.setLatLng(b.getNorthWest());
      cornerMarkers.ne.setLatLng(b.getNorthEast());
      cornerMarkers.se.setLatLng(b.getSouthEast());
      centerMarker.setLatLng(b.getCenter());
    }

    function updateRectangleFromInputs() {
      const minX = Number(inputs.minX.value);
      const minY = Number(inputs.minY.value);
      const maxX = Number(inputs.maxX.value);
      const maxY = Number(inputs.maxY.value);

      if (![minX, minY, maxX, maxY].every(Number.isFinite)) return;
      if (minX >= maxX || minY >= maxY) return;
      if (!rectangle || !window.L) return;

      const bounds = L.latLngBounds([minY, minX], [maxY, maxX]);
      rectangle.setBounds(bounds);
      if (cornerMarkers && centerMarker) {
        syncHandlesFromRectangle();
      }
    }

    function applyRenquishausenPreset() {
      inputs.minX.value = '8.873014';
      inputs.minY.value = '48.073240';
      inputs.maxX.value = '8.918314';
      inputs.maxY.value = '48.093240';

      updateRectangleFromInputs();

      if (map && rectangle) {
        map.fitBounds(rectangle.getBounds().pad(0.5));
      }
    }

    function updateRectangleFromCornerDrag() {
      const sw = cornerMarkers.sw.getLatLng();
      const nw = cornerMarkers.nw.getLatLng();
      const ne = cornerMarkers.ne.getLatLng();
      const se = cornerMarkers.se.getLatLng();

      const minY = Math.min(sw.lat, se.lat, nw.lat, ne.lat);
      const maxY = Math.max(sw.lat, se.lat, nw.lat, ne.lat);
      const minX = Math.min(sw.lng, se.lng, nw.lng, ne.lng);
      const maxX = Math.max(sw.lng, se.lng, nw.lng, ne.lng);
      const bounds = L.latLngBounds([minY, minX], [maxY, maxX]);
      rectangle.setBounds(bounds);
      updateInputsFromRectangle();
      syncHandlesFromRectangle();
    }

    function updateRectangleFromCenterDrag() {
      const currentBounds = rectangle.getBounds();
      const halfLat = (currentBounds.getNorth() - currentBounds.getSouth()) / 2;
      const halfLng = (currentBounds.getEast() - currentBounds.getWest()) / 2;
      const center = centerMarker.getLatLng();
      const bounds = L.latLngBounds(
        [center.lat - halfLat, center.lng - halfLng],
        [center.lat + halfLat, center.lng + halfLng]
      );
      rectangle.setBounds(bounds);
      updateInputsFromRectangle();
      syncHandlesFromRectangle();
    }

    if (cornerMarkers && centerMarker) {
      Object.values(cornerMarkers).forEach((marker) => {
        marker.on('drag', updateRectangleFromCornerDrag);
        marker.on('dragend', updateRectangleFromCornerDrag);
      });
      centerMarker.on('drag', updateRectangleFromCenterDrag);
      centerMarker.on('dragend', updateRectangleFromCenterDrag);
    }

    Object.values(inputs).forEach((input) => {
      input.addEventListener('input', updateRectangleFromInputs);
      input.addEventListener('change', updateRectangleFromInputs);
    });

    if (rectangle) {
      updateInputsFromRectangle();
      if (cornerMarkers && centerMarker) {
        syncHandlesFromRectangle();
      }
    } else {
      inputs.minX.value = '8.4';
      inputs.minY.value = '47.2';
      inputs.maxX.value = '8.9';
      inputs.maxY.value = '47.6';
    }

    const events = new EventSource('/events');
    events.onmessage = (event) => {
      try {
        const payload = JSON.parse(event.data);
        if (payload.type === 'ping') return;
        if (payload.type === 'log') appendLog(`[${payload.stream}] ${payload.line}`);
        if (payload.type === 'status') setStatus(payload.message);
        if (payload.type === 'status' && payload.message === 'input_download_started') {
          setInputStatus('Downloading main input file...');
          downloadInputBtn.disabled = true;
        }
        if (payload.type === 'status' && payload.message === 'input_download_finished') {
          setInputStatus('Input file downloaded and ready.');
          downloadInputBtn.disabled = false;
        }
        if (payload.type === 'done') {
          setStatus('Generation finished');
          startBtn.disabled = false;
          if (payload.downloadUrl) {
            downloadLink.href = payload.downloadUrl;
            downloadLink.classList.remove('hidden');
            downloadLink.textContent = `Download ${payload.filename}`;
          }
        }
        if (payload.type === 'error') {
          appendLog(`[error] ${payload.message}`);
          setStatus('Generation failed');
          startBtn.disabled = false;
        }
      } catch {
        appendLog(event.data);
      }
    };

    async function startGeneration() {
      const minX = Number(inputs.minX.value);
      const minY = Number(inputs.minY.value);
      const maxX = Number(inputs.maxX.value);
      const maxY = Number(inputs.maxY.value);
      const minZoom = minZoomInput.value === '' ? null : Number(minZoomInput.value);
      const maxZoom = maxZoomInput.value === '' ? null : Number(maxZoomInput.value);
      const extraArgs = extraArgsInput.value;

      if (minZoom !== null && (!Number.isInteger(minZoom) || minZoom < 0 || minZoom > PLANETILER_MAX_ZOOM)) {
        appendLog(`[error] minZoom must be an integer between 0 and ${PLANETILER_MAX_ZOOM}`);
        setStatus('Invalid min zoom');
        return;
      }
      if (maxZoom !== null && (!Number.isInteger(maxZoom) || maxZoom < 0 || maxZoom > PLANETILER_MAX_ZOOM)) {
        appendLog(`[error] maxZoom must be an integer between 0 and ${PLANETILER_MAX_ZOOM}`);
        setStatus('Invalid max zoom');
        return;
      }
      if (minZoom !== null && maxZoom !== null && minZoom > maxZoom) {
        appendLog('[error] minZoom must not be greater than maxZoom');
        setStatus('Invalid zoom range');
        return;
      }

      startBtn.disabled = true;
      downloadLink.classList.add('hidden');
      setStatus('Starting generation...');

      try {
        const response = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ minX, minY, maxX, maxY, minZoom, maxZoom, extraArgs })
        });

        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error || 'Failed to start generation');
        }

        appendLog(`[system] Generation accepted for bbox=${body.bbox}`);
        if (Array.isArray(body.args) && body.args.length > 0) {
          appendLog(`[system] Extra args: ${body.args.join(' ')}`);
        }
        setStatus('Generation running...');
      } catch (error) {
        appendLog(`[error] ${error.message}`);
        setStatus('Could not start generation');
        startBtn.disabled = false;
      }
    }

    async function refreshInputStatus() {
      try {
        const response = await fetch('/input-status');
        const body = await response.json();
        if (body.downloading) {
          setInputStatus('Downloading main input file...');
          downloadInputBtn.disabled = true;
        } else if (body.exists) {
          setInputStatus(`Input ready (${Math.round((body.sizeBytes || 0) / (1024 * 1024))} MB)`);
          downloadInputBtn.disabled = false;
        } else {
          setInputStatus('Input missing. Download required before generation.');
          downloadInputBtn.disabled = false;
        }
      } catch (error) {
        setInputStatus(`Could not check input status: ${error.message}`);
        downloadInputBtn.disabled = false;
      }
    }

    async function downloadInput() {
      downloadInputBtn.disabled = true;
      setInputStatus('Starting input download...');
      try {
        const response = await fetch('/download-main-osm', { method: 'POST' });
        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error || 'Failed to start download');
        }
        appendLog(`[system] Input download started from ${body.sourceUrl}`);
        setInputStatus('Downloading main input file...');
      } catch (error) {
        appendLog(`[error] ${error.message}`);
        setInputStatus(`Download failed: ${error.message}`);
        downloadInputBtn.disabled = false;
      }
    }

    refreshInputStatus();
    startBtn.addEventListener('click', startGeneration);
    downloadInputBtn.addEventListener('click', downloadInput);
    presetRenquishausenBtn.addEventListener('click', applyRenquishausenPreset);
  </script>
</body>

</html>
